<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ThrottleUp — Legal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    .logo { margin-bottom: 16px; }
    .logo img { width: 120px; height: auto; }
    h1 { font-size: 2.2rem; font-weight: 800; background: linear-gradient(135deg, #EA580C, #FB923C); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px; margin-bottom: 8px; }
    p { color: #64748b; margin-bottom: 40px; font-size: 0.95rem; }
    .links { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 360px; }
    a.card { background: #1a1a1a; border: 1px solid #2d2d2d; border-radius: 16px; padding: 20px 24px; text-decoration: none; display: flex; align-items: center; gap: 16px; transition: border-color 0.2s; }
    a.card:hover { border-color: #EA580C; }
    .card-icon { font-size: 1.8rem; }
    .card-text h2 { font-size: 1rem; font-weight: 700; color: #e2e8f0; }
    .card-text p { font-size: 0.8rem; color: #64748b; margin-bottom: 0; }
    .arrow { margin-left: auto; color: #EA580C; font-size: 1.2rem; }
    footer { margin-top: 48px; color: #334155; font-size: 0.75rem; }
  </style>
</head>
<body>
  <div class="logo"><img src="mascot_waving_smile.png" alt="ThrottleUp Mascot"></div>
  <h1>ThrottleUp</h1>
  <p>Your Garage. Organized.</p>

  <div class="links">
    <a href="privacy-policy.html" class="card">
      <span class="card-icon">🔒</span>
      <div class="card-text">
        <h2>Privacy Policy</h2>
        <p>Datenschutzerklärung</p>
      </div>
      <span class="arrow">→</span>
    </a>
    <a href="terms-of-service.html" class="card">
      <span class="card-icon">📄</span>
      <div class="card-text">
        <h2>Terms of Service</h2>
        <p>Nutzungsbedingungen</p>
      </div>
      <span class="arrow">→</span>
    </a>
    <a href="support.html" class="card">
      <span class="card-icon">💬</span>
      <div class="card-text">
        <h2>Support & FAQ</h2>
        <p>Hilfe & häufige Fragen</p>
      </div>
      <span class="arrow">→</span>
    </a>
  </div>

  <footer>© 2026 ThrottleUp · throttleup@gmail.com</footer>
</body>
</html>
